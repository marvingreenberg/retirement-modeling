schema: spec-driven

context: |
  Domain: Retirement financial planning — tax-aware withdrawal, Roth conversion, and spending simulation
  Backend: Python 3.11+, FastAPI, click CLI
  Frontend: SvelteKit, TypeScript, Chart.js, Zod (in ui/ directory)
  Package manager: pnpm for frontend (ui/)
  Testing: pytest with coverage, fixtures in conftest.py; Vitest + @testing-library/svelte + jsdom for frontend unit/component tests; Playwright for E2E (future); query by role/label, not DOM structure
  Style: Black (line-length 100), isort, mypy strict, type hints on all functions
  Build: Makefile, pyproject.toml, pip editable install; pnpm for ui/
  Structure: src/retirement_model/ for source, tests/ for tests, ui/ for frontend

rules:
  specs:
    - >
      Delta specs (in changes/) use change-oriented language (ADDED, MODIFIED, REMOVED)
      and may reference what was replaced. When these are synced to main specs, strip
      evolutionary language. Main specs describe what IS, not what changed.
      Avoid: "replaces X", "no X exists", "unchanged from before".
      The archived delta specs preserve the change context.
