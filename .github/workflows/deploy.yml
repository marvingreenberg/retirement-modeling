name: Deploy

on:
  push:
    tags: ["v*"]

env:
  SERVICE_NAME: retirement-model
  GCP_REGION: us-central1
  GCP_REPOSITORY: container-images

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git describe

      - name: Derive version from git tags
        id: version
        run: |
          VERSION=$(git describe --tags --always | sed 's/^v//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Classify release
        id: classify
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          MAJOR=$(echo "$TAG" | cut -d. -f1)
          if echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            STABLE=true
          else
            STABLE=false
          fi
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "stable=$STABLE" >> "$GITHUB_OUTPUT"
          echo "Major: $MAJOR, Stable: $STABLE"

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - uses: docker/setup-buildx-action@v3

      - name: Compute Docker tags
        id: tags
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MAJOR="${{ steps.classify.outputs.major }}"
          STABLE="${{ steps.classify.outputs.stable }}"
          GHCR="ghcr.io/${{ github.repository_owner }}/${SERVICE_NAME}"
          GAR="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/${GCP_REPOSITORY}/${SERVICE_NAME}"
          TAGS="${GHCR}:${VERSION},${GAR}:${VERSION}"
          if [ "$STABLE" = "true" ]; then
            TAGS="${TAGS},${GHCR}:latest,${GAR}:latest"
            TAGS="${TAGS},${GHCR}:v${MAJOR},${GAR}:v${MAJOR}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push to both registries
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.tags.outputs.tags }}

      - name: Deploy to Cloud Run
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
        run: |
          GCP_IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/${GCP_REPOSITORY}/${SERVICE_NAME}"
          gcloud run deploy "${SERVICE_NAME}" \
            --image="${GCP_IMAGE}:${VERSION}" \
            --platform=managed \
            --region="${GCP_REGION}" \
            --allow-unauthenticated \
            --port=8000 --memory=512Mi --cpu=1 \
            --min-instances=0 --max-instances=3 \
            --set-env-vars="PYTHONUNBUFFERED=1"
          echo "Deployed: $(gcloud run services describe ${SERVICE_NAME} --region=${GCP_REGION} --format='value(status.url)')"

      - name: Deploy major-version service
        if: steps.classify.outputs.stable == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
        run: |
          MAJOR="${{ steps.classify.outputs.major }}"
          GCP_IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/${GCP_REPOSITORY}/${SERVICE_NAME}"
          gcloud run deploy "${SERVICE_NAME}-v${MAJOR}" \
            --image="${GCP_IMAGE}:${VERSION}" \
            --platform=managed \
            --region="${GCP_REGION}" \
            --allow-unauthenticated \
            --port=8000 --memory=512Mi --cpu=1 \
            --min-instances=0 --max-instances=3 \
            --set-env-vars="PYTHONUNBUFFERED=1"
          echo "Deployed: $(gcloud run services describe ${SERVICE_NAME}-v${MAJOR} --region=${GCP_REGION} --format='value(status.url)')"
