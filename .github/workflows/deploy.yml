name: Deploy

on:
  push:
    tags: ["v*"]

env:
  SERVICE_NAME: retirement-model
  GCP_REGION: us-central1

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git describe

      - name: Derive version from git tags
        id: version
        run: |
          VERSION=$(git describe --tags --always | sed 's/^v//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.SERVICE_NAME }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ env.SERVICE_NAME }}:latest

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Push to Artifact Registry and deploy
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
        run: |
          GCP_IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/retirement-sim/${SERVICE_NAME}"

          # Tag and push to GCP Artifact Registry
          docker tag "ghcr.io/${{ github.repository_owner }}/${SERVICE_NAME}:${VERSION}" "${GCP_IMAGE}:${VERSION}"
          docker tag "ghcr.io/${{ github.repository_owner }}/${SERVICE_NAME}:${VERSION}" "${GCP_IMAGE}:latest"
          gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet
          docker push "${GCP_IMAGE}:${VERSION}"
          docker push "${GCP_IMAGE}:latest"

          # Deploy to Cloud Run
          gcloud run deploy "${SERVICE_NAME}" \
            --image="${GCP_IMAGE}:${VERSION}" \
            --platform=managed \
            --region="${GCP_REGION}" \
            --allow-unauthenticated \
            --port=8000 --memory=512Mi --cpu=1 \
            --min-instances=0 --max-instances=3 \
            --set-env-vars="PYTHONUNBUFFERED=1"

          echo "Deployed: $(gcloud run services describe ${SERVICE_NAME} --region=${GCP_REGION} --format='value(status.url)')"
