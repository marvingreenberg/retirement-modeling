services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://api:8000
    volumes:
      - ./ui/src:/app/src
    depends_on:
      - api
